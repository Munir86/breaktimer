<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top:    #0f0c29;
      --bg-mid:    #302b63;
      --bg-bot:    #24243e;
      --surface:   rgba(255,255,255,0.08);
      --surface-2: rgba(255,255,255,0.14);
      --border:    rgba(255,255,255,0.18);
      --text:      #ffffff;
      --sub:       rgba(255,255,255,0.55);
      --accent:    #64d2ff;
      --accent2:   #bf5af2;
      --green:     #32d74b;
      --orange:    #ff9f0a;
      --red:       #ff453a;
      --ring-size: 280px;
      --ring-stroke: 14px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-mid), var(--bg-bot));
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob1 { width: 420px; height: 420px; background: #bf5af2; top: -100px; right: -80px; animation-delay: 0s; }
    .blob2 { width: 350px; height: 350px; background: #64d2ff; bottom: -80px; left: -60px; animation-delay: 4s; }
    .blob3 { width: 260px; height: 260px; background: #ff9f0a; top: 40%; left: 50%; animation-delay: 8s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 30px) scale(1.08); }
    }

    /* ─── Lang switcher ─── */
    .lang-bar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 6px;
    }
    [dir="rtl"] .lang-bar { left: auto; right: 16px; }

    .lang-btn {
      padding: 5px 11px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all .2s;
      font-family: inherit;
    }
    .lang-btn:hover { color: var(--text); background: var(--surface-2); }
    .lang-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 28px;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--sub); font-size: 14px; margin-top: 4px; }

    .card {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.12) inset;
      transition: transform .3s;
    }
    .card:hover { transform: translateY(-2px); }

    .duration-section { width: 100%; }
    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 12px;
      text-align: center;
    }
    .chips {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .chip {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .chip:hover { background: var(--surface-2); }
    .chip.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(100,210,255,0.35);
    }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
    }
    .custom-row label { font-size: 13px; color: var(--sub); white-space: nowrap; }
    .custom-input {
      width: 70px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .custom-input:focus { border-color: var(--accent); }
    .custom-input::-webkit-inner-spin-button,
    .custom-input::-webkit-outer-spin-button { opacity: 0; }
    .custom-row .unit { font-size: 13px; color: var(--sub); }

    .ring-wrap {
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring-wrap svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: var(--ring-stroke); }
    .ring-fill {
      fill: none;
      stroke-width: var(--ring-stroke);
      stroke-linecap: round;
      stroke-dasharray: 785;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke .5s;
    }
    .ring-glow {
      fill: none;
      stroke-width: 2px;
      stroke-linecap: round;
      stroke-dasharray: 785;
      stroke-dashoffset: 0;
      filter: url(#glow);
      transition: stroke-dashoffset 1s linear, stroke .5s;
      opacity: 0.6;
    }

    .timer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 1;
    }
    .timer-display {
      font-size: 68px;
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color .4s;
    }
    .timer-label {
      font-size: 13px;
      color: var(--sub);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .percent-text { font-size: 12px; color: var(--sub); margin-top: 2px; }

    .controls { display: flex; align-items: center; gap: 16px; }
    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { transform: scale(0.94); }
    .btn-main {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(100,210,255,0.4);
    }
    .btn-main:hover { box-shadow: 0 12px 40px rgba(100,210,255,0.6); transform: scale(1.05); }
    .btn-sec {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--sub);
      font-size: 20px;
    }
    .btn-sec:hover { background: var(--surface); color: var(--text); }

    .status-bar { width: 100%; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .status-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 1s linear, background .5s;
    }

    .phase-dots { display: flex; gap: 6px; justify-content: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all .3s; }
    .dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); width: 20px; border-radius: 3px; }

    .notif-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
    }
    .notif-overlay.show { opacity: 1; pointer-events: all; }

    .notif-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 36px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      transform: scale(0.88) translateY(30px);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .notif-overlay.show .notif-card { transform: scale(1) translateY(0); }

    .notif-icon { font-size: 64px; animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .notif-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--green), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .notif-sub { font-size: 15px; color: var(--sub); line-height: 1.5; }

    .notif-btns { display: flex; gap: 10px; width: 100%; margin-top: 8px; }
    .notif-btn {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
    }
    .notif-btn:active { transform: scale(0.95); }
    .notif-btn.primary { background: linear-gradient(135deg, var(--green), #00c853); color: #fff; box-shadow: 0 6px 24px rgba(50,215,75,0.4); }
    .notif-btn.secondary { background: var(--surface-2); color: var(--text); border: 1.5px solid var(--border); }

    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .pulse {
      position: absolute;
      width: var(--ring-size);
      height: var(--ring-size);
      border-radius: 50%;
      border: 3px solid var(--green);
      animation: pulse-ring 1.2s ease-out infinite;
      pointer-events: none;
    }

    .time-info { display: flex; justify-content: space-between; width: 100%; padding: 0 4px; }
    .time-info span { font-size: 12px; color: var(--sub); }

    @media (max-width: 420px) {
      :root { --ring-size: 230px; }
      .card { padding: 28px 22px 24px; }
      .timer-display { font-size: 54px; }
    }
  </style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<canvas id="confetti-canvas"></canvas>

<!-- Language switcher -->
<div class="lang-bar" id="langBar"></div>

<div class="app">
  <div class="header">
    <h1 id="headTitle"></h1>
    <p id="headSub"></p>
  </div>

  <div class="card">
    <div class="duration-section">
      <div class="section-label" id="labelDuration"></div>
      <div class="chips" id="chipsContainer"></div>
      <div class="custom-row">
        <label id="labelCustom"></label>
        <input class="custom-input" id="customMin" type="number" min="1" max="120" />
        <span class="unit" id="unitMin"></span>
      </div>
    </div>

    <div class="phase-dots">
      <div class="dot active" id="dot0"></div>
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <div class="ring-wrap" id="ringWrap">
      <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#64d2ff"/>
            <stop offset="100%" stop-color="#bf5af2"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="140" cy="140" r="125"/>
        <circle class="ring-glow" id="ringGlow" cx="140" cy="140" r="125" stroke="url(#ringGrad)"/>
        <circle class="ring-fill" id="ringFill" cx="140" cy="140" r="125" stroke="url(#ringGrad)"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-display" id="timerDisplay">05:00</div>
        <div class="timer-label" id="timerLabel"></div>
        <div class="percent-text" id="percentText">100%</div>
      </div>
    </div>

    <div style="width:100%">
      <div class="status-bar"><div class="status-fill" id="statusFill"></div></div>
      <div class="time-info">
        <span id="labelStart"></span>
        <span id="endTime">—</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-sec" id="resetBtn">↺</button>
      <button class="btn btn-main" id="playBtn">▶</button>
      <button class="btn btn-sec" id="skipBtn">⏭</button>
    </div>
  </div>
</div>

<div class="notif-overlay" id="notifOverlay">
  <div class="notif-card">
    <div class="notif-icon">🎉</div>
    <div class="notif-title" id="notifTitle"></div>
    <div class="notif-sub" id="notifSub"></div>
    <div class="notif-btns">
      <button class="notif-btn primary" id="backToStudy"></button>
      <button class="notif-btn secondary" id="extendBreak"></button>
    </div>
  </div>
</div>

<script>
// ─── Translations ─────────────────────────────────────────────────────────────
const LANGS = {

    headSub: 'استرح وعُد بطاقة متجددة',
    labelDuration: 'مدة الاستراحة',
    labelCustom: 'مخصص:',

  },

    placeholder: 'min',
    notifBody: 'Time to get back to studying!',
    notifHeader: '⏰ Break is over!',
  },
  fr: {
    dir: 'ltr', code: 'fr',
    headTitle: 'Minuterie Pause ☕',

    labelDuration: 'Durée de la pause',
    labelCustom: 'Personnalisé :',

    placeholder: 'min',

  },
  es: {
    dir: 'ltr', code: 'es',
    headTitle: 'Temporizador de Descanso ☕',
    headSub: 'Descansa y vuelve con energía',
    labelDuration: 'Duración del descanso',
    labelCustom: 'Personalizado:',
    unitMin: 'min',
    chipUnit: 'm',
    timerBreak: 'Descanso',

    notifTitle: '¡El descanso terminó!',

  },
  de: {

  },
  tr: {
    dir: 'ltr', code: 'tr',
    headTitle: 'Mola Zamanlayıcısı ☕',

    backToStudy: 'Çalışmaya Dön ✦',
    extendBreak: '5 dakika daha',
    btnPlay: '▶', btnPause: '⏸',

    notifHeader: '⏰ Mola bitti!',
  },

const CHIP_MINUTES = [5, 10, 15, 20, 30];

// ─── Detect language ──────────────────────────────────────────────────────────
function detectLang() {
  const saved = localStorage.getItem('breakTimerLang');
  if (saved && LANGS[saved]) return saved;
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  for (const code of Object.keys(LANGS)) {
    if (nav.startsWith(code)) return code;
  }
  return 'en';
}

let currentLang = detectLang();

// ─── Apply language ───────────────────────────────────────────────────────────
function applyLang(code) {
  currentLang = code;
  localStorage.setItem('breakTimerLang', code);
  const t = LANGS[code];
  const html = document.documentElement;
  html.lang = code;
  html.dir  = t.dir;

  // lang bar positioning
  const bar = document.getElementById('langBar');
  if (t.dir === 'rtl') { bar.style.right = '16px'; bar.style.left = 'auto'; }
  else                  { bar.style.left = '16px';  bar.style.right = 'auto'; }

  // texts
  document.getElementById('headTitle').textContent     = t.headTitle;
  document.getElementById('headSub').textContent       = t.headSub;
  document.getElementById('labelDuration').textContent = t.labelDuration;
  document.getElementById('labelCustom').textContent   = t.labelCustom;
  document.getElementById('unitMin').textContent       = t.unitMin;
  document.getElementById('labelStart').textContent    = t.labelStart;
  document.getElementById('notifTitle').textContent    = t.notifTitle;
  document.getElementById('notifSub').innerHTML        = t.notifSub.replace('\n', '<br>');
  document.getElementById('backToStudy').textContent   = t.backToStudy;
  document.getElementById('extendBreak').textContent   = t.extendBreak;
  document.getElementById('customMin').placeholder     = t.placeholder;
  document.title = t.headTitle.replace(' ☕','');

  // chips
  buildChips();

  // update dynamic labels
  const running_ = running;
  document.getElementById('timerLabel').textContent = remaining <= 0 ? t.timerDone : t.timerBreak;
  document.getElementById('playBtn').textContent = running_ ? t.btnPause : t.btnPlay;

  // lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === code);
  });
}

// ─── Build lang bar ───────────────────────────────────────────────────────────
function buildLangBar() {
  const bar = document.getElementById('langBar');
  bar.innerHTML = '';
  Object.keys(LANGS).forEach(code => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = code.toUpperCase();
    btn.addEventListener('click', () => applyLang(code));
    bar.appendChild(btn);
  });
}

// ─── Build chips ──────────────────────────────────────────────────────────────
function buildChips() {
  const t = LANGS[currentLang];
  const container = document.getElementById('chipsContainer');
  const activeMin = totalSeconds / 60;
  container.innerHTML = '';
  CHIP_MINUTES.forEach(min => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (min === activeMin && !customInput.value ? ' active' : '');
    btn.dataset.min = min;
    btn.textContent = `${min} ${t.chipUnit}`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      customInput.value = '';
      setDuration(min);
      document.getElementById('timerLabel').textContent = t.timerBreak;
    });
    container.appendChild(btn);
  });
}

// ─── State ────────────────────────────────────────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 125;
let totalSeconds = 5 * 60;
let remaining    = totalSeconds;
let running      = false;
let tickInterval = null;
let pulseEl      = null;

const timerDisplay = document.getElementById('timerDisplay');
const timerLabel   = document.getElementById('timerLabel');
const percentText  = document.getElementById('percentText');
const ringFill     = document.getElementById('ringFill');
const ringGlow     = document.getElementById('ringGlow');
const statusFill   = document.getElementById('statusFill');
const playBtn      = document.getElementById('playBtn');
const resetBtn     = document.getElementById('resetBtn');
const skipBtn      = document.getElementById('skipBtn');
const notifOverlay = document.getElementById('notifOverlay');
const endTime      = document.getElementById('endTime');
const customInput  = document.getElementById('customMin');
const ringWrap     = document.getElementById('ringWrap');

function fmt(s) {
  return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

function setDuration(min) {
  totalSeconds = min * 60;
  remaining    = totalSeconds;
  if (running) stopTimer();
  updateUI();
}

function updateUI() {
  const pct = remaining / totalSeconds;
  timerDisplay.textContent = fmt(remaining);
  percentText.textContent  = Math.round(pct * 100) + '%';
  statusFill.style.width   = ((1-pct)*100) + '%';

  const offset = CIRCUMFERENCE * pct;
  ringFill.style.strokeDashoffset = offset;
  ringGlow.style.strokeDashoffset = offset;

  if (pct > 0.5) {
    timerDisplay.style.color = '#ffffff';
    ringFill.setAttribute('stroke','url(#ringGrad)');
    ringGlow.setAttribute('stroke','url(#ringGrad)');
    statusFill.style.background = 'linear-gradient(90deg,#64d2ff,#bf5af2)';
  } else if (pct > 0.25) {
    timerDisplay.style.color = '#ff9f0a';
    ringFill.setAttribute('stroke','#ff9f0a');
    ringGlow.setAttribute('stroke','#ff9f0a');
    statusFill.style.background = 'linear-gradient(90deg,#ff9f0a,#ff6b00)';
  } else {
    timerDisplay.style.color = '#ff453a';
    ringFill.setAttribute('stroke','#ff453a');
    ringGlow.setAttribute('stroke','#ff453a');
    statusFill.style.background = 'linear-gradient(90deg,#ff453a,#ff0000)';
  }

  const phase = pct > 0.66 ? 0 : pct > 0.33 ? 1 : 2;
  [0,1,2].forEach(i => document.getElementById(`dot${i}`).classList.toggle('active', i === phase));
}

function startTimer() {
  const t = LANGS[currentLang];
  if (remaining <= 0) remaining = totalSeconds;
  running = true;
  playBtn.textContent = t.btnPause;
  const now = new Date(Date.now() + remaining * 1000);
  endTime.textContent = now.toLocaleTimeString(t.code, { hour: '2-digit', minute: '2-digit' });
  tickInterval = setInterval(() => {
    remaining--;
    updateUI();
    if (remaining <= 0) { clearInterval(tickInterval); running = false; onFinish(); }
  }, 1000);
}

function stopTimer() {
  const t = LANGS[currentLang];
  running = false;
  clearInterval(tickInterval);
  playBtn.textContent = t.btnPlay;
}

function resetTimer() {
  stopTimer();
  remaining = totalSeconds;
  endTime.textContent = '—';
  removePulse();
  updateUI();
}

function onFinish() {
  const t = LANGS[currentLang];
  playBtn.textContent = t.btnPlay;
  timerLabel.textContent = t.timerDone;
  addPulse();
  playNotifSound();
  launchConfetti();
  requestBrowserNotif();
  setTimeout(() => notifOverlay.classList.add('show'), 400);
}

function addPulse() {
  removePulse();
  pulseEl = document.createElement('div');
  pulseEl.className = 'pulse';
  ringWrap.appendChild(pulseEl);
}
function removePulse() { if (pulseEl) { pulseEl.remove(); pulseEl = null; } }

// ─── Gentle iOS-style alarm chime ────────────────────────────────────────────
// Uses additive synthesis (fundamental + harmonics) to create a soft bell tone,
// then repeats the pattern 3 times with a gentle fade for a calm alarm feel.
function playNotifSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Master gain for global volume control (soft)
    const master = ctx.createGain();
    master.gain.value = 0.45;

    // Light reverb via convolver-style delay feedback for warmth
    const delay = ctx.createDelay();
    delay.delayTime.value = 0.18;
    const feedback = ctx.createGain();
    feedback.gain.value = 0.25;
    const wet = ctx.createGain();
    wet.gain.value = 0.35;

    master.connect(ctx.destination);
    master.connect(delay);
    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(wet);
    wet.connect(ctx.destination);

    // A bell-like note: fundamental + 2 harmonics with quick attack & long decay
    function bell(freq, startTime, duration = 1.4, vol = 0.5) {
      // Harmonic ratios that mimic a real bell/chime
      const harmonics = [
        { ratio: 1.0,  gain: 1.0  },
        { ratio: 2.0,  gain: 0.45 },
        { ratio: 3.0,  gain: 0.22 },
        { ratio: 4.2,  gain: 0.10 },
      ];
      harmonics.forEach(h => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type   = 'sine';
        osc.frequency.value = freq * h.ratio;
        osc.connect(gain);
        gain.connect(master);

        const t = startTime;
        gain.gain.setValueAtTime(0, t);
        // Soft attack
        gain.gain.linearRampToValueAtTime(vol * h.gain, t + 0.012);
        // Long natural decay
        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

        osc.start(t);
        osc.stop(t + duration + 0.05);
      });
    }

    // Pleasant ascending pattern, repeated 3 times like a gentle alarm
    // Notes: E5 (659.25) → G5 (783.99) → C6 (1046.50) — major triad, calming
    const pattern = [659.25, 783.99, 1046.50];
    const now = ctx.currentTime;

    for (let rep = 0; rep < 3; rep++) {
      const repOffset = rep * 1.6;
      pattern.forEach((f, i) => {
        // Each repetition slightly softer for a fading effect
        const vol = 0.55 - rep * 0.12;
        bell(f, now + repOffset + i * 0.22, 1.5, vol);
      });
    }
  } catch (e) { /* AudioContext blocked — silent fallback */ }
}

function requestBrowserNotif() {
  const t = LANGS[currentLang];
  if (!('Notification' in window)) return;
  const fire = () => new Notification(t.notifHeader, {
    body: t.notifBody,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="50" font-size="50">☕</text></svg>'
  });
  if (Notification.permission === 'granted') fire();
  else if (Notification.permission !== 'denied') Notification.requestPermission().then(p => { if (p==='granted') fire(); });
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const COLORS = ['#64d2ff','#bf5af2','#32d74b','#ff9f0a','#ff453a','#fff'];
  const pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height - canvas.height,
    r: 3+Math.random()*5,
    vx: (Math.random()-.5)*4,
    vy: 3+Math.random()*5,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    angle: Math.random()*360,
    spin: (Math.random()-.5)*8,
    shape: Math.random()>.5?'rect':'circle'
  }));
  let frame, elapsed = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1-elapsed/280);
      if (p.shape==='rect') ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.angle+=p.spin;
    });
    elapsed++;
    if (elapsed<300) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame); elapsed=0; draw();
}

// ─── Events ───────────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => { if (running) stopTimer(); else startTimer(); });
resetBtn.addEventListener('click', () => {
  timerLabel.textContent = LANGS[currentLang].timerBreak;
  resetTimer();
});
skipBtn.addEventListener('click', () => { stopTimer(); remaining=0; updateUI(); onFinish(); });

customInput.addEventListener('input', () => {
  const val = parseInt(customInput.value, 10);
  if (val >= 1 && val <= 120) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    setDuration(val);
    timerLabel.textContent = LANGS[currentLang].timerBreak;
  }
});

document.getElementById('backToStudy').addEventListener('click', () => {
  notifOverlay.classList.remove('show');
  removePulse();
  resetTimer();
  timerLabel.textContent = LANGS[currentLang].timerBreak;
});

document.getElementById('extendBreak').addEventListener('click', () => {
  notifOverlay.classList.remove('show');
  removePulse();
  totalSeconds = 5*60; remaining = totalSeconds;
  updateUI(); startTimer();
  timerLabel.textContent = LANGS[currentLang].timerBreak;
});

// ─── Init ─────────────────────────────────────────────────────────────────────
ringFill.style.strokeDasharray  = CIRCUMFERENCE;
ringGlow.style.strokeDasharray  = CIRCUMFERENCE;
ringFill.style.strokeDashoffset = 0;
ringGlow.style.strokeDashoffset = 0;

buildLangBar();
applyLang(currentLang);
updateUI();

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
